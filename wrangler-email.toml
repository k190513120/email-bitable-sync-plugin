name = "email-sync-service"
main = "cloudflare/email-worker.js"
compatibility_date = "2026-03-11"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "emailsync.xiaomiao.win", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[triggers]
crons = ["0 * * * *"]

[vars]
STRIPE_PRODUCT_NAME = "邮箱同步飞书多维表格"
STRIPE_PUBLISHABLE_KEY = "pk_live_51RnjToGcUZLGzSsVpGqXDJt4ZZvOdS0kAQnOwXdcAMRSvPQN2u6XNC3qBAtBcFScnzQeczJscofJVSSZm4rmJGSX008k4tQfUZ"
ALIPAY_AMOUNT = "980.00"
ALIPAY_SUBJECT = "邮箱同步飞书多维表格"

[[kv_namespaces]]
binding = "EMAIL_STATE"
id = "0f0d3c6453bf45daa1df06e90bca39b1"

# service binding → bitable-billing-worker (Phase 1 dual-write integration)
[[services]]
binding = "BILLING"
service = "billing-service"
